databases:
  - name: founder-student-db
    databaseName: founder_student
    user: db_user
    plan: free

services:
  - type: web
    name: founder-student-hub
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: founder-student-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://founder-student-hub.onrender.com
      - key: NODE_ENV
        value: production
